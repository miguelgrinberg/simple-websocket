[testenv]
commands=
    pip install -e .
    pytest -p no:logging --asyncio-mode strict --cov=simple_websocket --cov-branch --cov-report=term-missing --cov-report=xml
deps=
    pytest
    pytest-cov
    pytest-asyncio

[testenv:flake8]
deps=
    flake8
commands=
    flake8 --exclude=".*" src/simple_websocket tests

[testenv:docs]
changedir=docs
deps=
    sphinx
allowlist_externals=
    make
commands=
    make html
